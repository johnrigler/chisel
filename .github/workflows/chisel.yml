name: Chisel CI + Pages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug checkout
        run: |
          pwd
          ls -la
          find . -maxdepth 2 \( -name 'index.html' -o -name 'app.js' -o -name 'README_PATCH.txt' \) -print

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify required files exist
        run: |
          test -f index.html
          test -f app.js
          test -f chisel.js
          test -f chisel.sign.js
          test -f chisel.ravencoin.js
          test -f chisel.digibyte.js
          test -f chisel.unspendable.js
          test -f qrScan.html
          test -f tools/decoder/index.html
          test -f tools/boxLabels.html
          test -f tools/qrField/index.html
          test -f tools/README_PATCH.txt

      - name: Syntax check JavaScript
        run: |
          node --check chisel.js
          node --check chisel.sign.js
          node --check chisel.ravencoin.js
          node --check chisel.digibyte.js
          node --check chisel.unspendable.js
          node --check app.js

      - name: Check expected script references in index.html
        run: |
          grep -q 'chisel.js' index.html
          grep -q 'chisel.sign.js' index.html
          grep -q 'chisel.ravencoin.js' index.html
          grep -q 'chisel.digibyte.js' index.html
          grep -q 'chisel.unspendable.js' index.html
          grep -q 'app.js' index.html
          grep -q 'tools/qrField/index.html' index.html

      - name: Build site directory
        run: |
          mkdir -p dist
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='dist' \
            --exclude='node_modules' \
            ./ dist/

      - name: Verify deploy entry file exists
        run: |
          test -f dist/index.html
          test -f dist/app.js

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
