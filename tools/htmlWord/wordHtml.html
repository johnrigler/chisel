<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <title>Decentralized Word to HTML Converter</title>

    <style>
      :root {
        color-scheme: light dark;
        --background: #f7f7f8;
        --foreground: #171717;
        --muted: #666666;
        --panel: #ffffff;
        --border: #d8d8d8;
        --accent: #2457ff;
        --accent-dark: #183fc0;
        --danger: #b00020;
        --radius: 14px;
        --shadow: 0 12px 34px rgba(0, 0, 0, 0.08);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --background: #101114;
          --foreground: #f5f5f5;
          --muted: #aaaaaa;
          --panel: #181a20;
          --border: #333743;
          --accent: #7d9aff;
          --accent-dark: #9db2ff;
          --danger: #ff8a8a;
          --shadow: none;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--background);
        color: var(--foreground);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      main {
        width: min(1200px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      h1,
      h2 {
        margin: 0;
        line-height: 1.1;
      }

      h1 {
        font-size: clamp(2rem, 5vw, 4rem);
        letter-spacing: -0.055em;
      }

      h2 {
        font-size: 1rem;
      }

      p {
        color: var(--muted);
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 800;
      }

      input,
      textarea,
      button {
        font: inherit;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--panel);
        color: var(--foreground);
      }

      input {
        min-height: 44px;
        padding: 10px;
      }

      textarea {
        min-height: 560px;
        padding: 14px;
        resize: vertical;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 0.92rem;
      }

      button {
        min-height: 44px;
        border: 0;
        border-radius: 999px;
        padding: 0 18px;
        background: var(--accent);
        color: white;
        cursor: pointer;
        font-weight: 800;
      }

      button:hover {
        background: var(--accent-dark);
      }

      button.secondary {
        background: transparent;
        color: var(--foreground);
        border: 1px solid var(--border);
      }

      button.secondary:hover {
        background: color-mix(in srgb, var(--foreground) 8%, transparent);
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .panel {
        margin-top: 24px;
        padding: 18px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin: 14px 0;
      }

      .preview {
        min-height: 560px;
        padding: 24px;
        overflow: auto;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: white;
        color: #171717;
      }

      .preview table {
        width: 100%;
        border-collapse: collapse;
      }

      .preview th,
      .preview td {
        border: 1px solid #333333;
        padding: 6px;
      }

      .preview img {
        max-width: 100%;
        height: auto;
      }

      .status {
        margin-top: 12px;
        color: var(--muted);
      }

      .danger {
        color: var(--danger);
      }

      @media (max-width: 900px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <main>
      <header>
        <h1>Word to HTML</h1>
        <p>
          Standalone decentralized converter. Reads Word documents locally and generates editable HTML.
        </p>
      </header>

      <section class="panel">
        <label for="wordFile">Upload Word or HTML document</label>
        <input id="wordFile" type="file" accept=".docx,.doc,.html,.htm,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/msword,text/html" />

        <div class="toolbar">
          <button id="downloadHtml" type="button" disabled>Download HTML</button>
          <button class="secondary" id="copyHtml" type="button" disabled>Copy HTML</button>
          <button class="secondary" id="clearAll" type="button">Clear</button>
        </div>

        <p class="status" id="status" role="status" aria-live="polite">Upload a .docx file to begin.</p>

        <div class="grid">
          <section>
            <h2>Generated HTML</h2>
            <textarea id="htmlOutput" spellcheck="false"></textarea>
          </section>

          <section>
            <h2>Preview</h2>
            <div class="preview" id="preview"></div>
          </section>
        </div>
      </section>
    </main>
