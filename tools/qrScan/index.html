<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <title>Chisel QR Key Scanner</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #0b0d10;
      color: #e6edf3;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 18px;
      display: grid;
      gap: 14px;
    }
    .panel {
      background: #11161c;
      border: 1px solid #222a33;
      border-radius: 12px;
      padding: 14px;
      display: grid;
      gap: 10px;
    }
    h1, h2, p { margin: 0; }
    p { color: #9fb0c0; line-height: 1.45; }
    label { color: #b8c7d6; font-size: 13px; }
    input, select, button, textarea { font: inherit; }
    input, select, textarea {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #2c3642;
      border-radius: 10px;
      background: #0a0f14;
      color: #e6edf3;
      outline: none;
    }
    textarea { min-height: 84px; resize: vertical; }
    button {
      border: 0;
      border-radius: 10px;
      padding: 11px 14px;
      background: #705dff;
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }
    button.secondary { background: #1d2630; color: #d7e2ee; border: 1px solid #2c3642; }
    button.danger { background: #3a1f25; color: #ffd4dc; border: 1px solid #66313b; }
    button:disabled { opacity: 0.55; cursor: default; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .grid2 { display: grid; gap: 10px; grid-template-columns: 1fr 1fr; }
    .chunks { display: grid; gap: 8px; }
    .chunkRow { display: grid; grid-template-columns: 70px 1fr; gap: 8px; align-items: center; }
    .slot {
      border: 1px solid #2c3642;
      border-radius: 10px;
      background: #05080b;
      padding: 10px;
      min-height: 41px;
      word-break: break-all;
      color: #c5f467;
    }
    .muted { color: #91a4b7; }
    .error { color: #ff7b7b; }
    .good { color: #c5f467; }
    #reader {
      overflow: hidden;
      border-radius: 12px;
      border: 1px solid #263241;
      background: #05080b;
    }
    #lastScan, #wifOutput, #hexOutput {
      word-break: break-all;
      white-space: pre-wrap;
    }
    @media (max-width: 620px) {
      .grid2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<main>
  <section class="panel">
    <h1>Chisel QR Key Scanner</h1>
    <p>Scan four 16-hex stickers. The scanner stacks them into one 64-hex private key, builds compressed WIF, then returns it to Chisel.</p>
  </section>

  <section class="panel">
    <div class="grid2">
      <div>
        <label for="currency">Currency</label>
        <select id="currency">
          <option value="ravencoin">Ravencoin</option>
          <option value="digibyte">Digibyte</option>
        </select>
      </div>
      <div>
        <label for="compressed">WIF mode</label>
        <select id="compressed">
          <option value="1">Compressed WIF</option>
          <option value="0">Uncompressed WIF</option>
        </select>
      </div>
    </div>
    <label><input id="autoReturn" type="checkbox" checked> return to opener after 64 hex characters</label>
  </section>

  <section class="panel">
    <div id="reader"></div>
    <div class="actions">
      <button id="startButton" type="button">START CAMERA</button>
      <button id="stopButton" class="secondary" type="button" disabled>STOP</button>
      <button id="clearButton" class="danger" type="button">CLEAR</button>
    </div>
    <p id="status" class="muted">Camera idle.</p>
    <p class="muted">Last scan: <span id="lastScan"></span></p>
  </section>

  <section class="panel">
    <h2>Key chunks</h2>
    <div class="chunks" id="chunks"></div>
    <label for="manualInput">Manual paste fallback</label>
    <input id="manualInput" spellcheck="false" autocomplete="off" placeholder="paste 16 hex or full 64 hex">
    <div class="actions">
      <button id="addManualButton" class="secondary" type="button">ADD MANUAL HEX</button>
      <button id="returnButton" type="button" disabled>RETURN WIF TO CHISEL</button>
    </div>
  </section>

  <section class="panel">
    <label>Private key HEX</label>
    <div id="hexOutput" class="slot"></div>
    <label>WIF</label>
    <div id="wifOutput" class="slot"></div>
  </section>
</main>

<script>
(function () {
  "use strict";

  window.CHISEL_QR_SCAN_CONFIG = window.CHISEL_QR_SCAN_CONFIG || {
    VERSION: "2.4.1",
    HTML5_QRCODE_SRC: "../assets/vendor/html5-qrcode/minified/html5-qrcode.min.js",
    REQUIRED_HEX_LENGTH: 64,
    CHUNK_HEX_LENGTH: 16,
    QRBOX_SIZE: 260,
    FPS: 10,
    DEFAULT_COMPRESSED: true,
    MAINNET_WIF_PREFIX: 128
  };

  var config = window.CHISEL_QR_SCAN_CONFIG;
  var B58 = "123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";
  var secp256k1Order = "fffffffffffffffffffffffffffffffebaaedce6af48a03bbfd25e8cd0364141";
  var scanner = null;
  var isRunning = false;
  var chunks = [];
  var lastText = "";
  var lastAt = 0;
  var didAutoReturn = false;

  var elems = {
    currency: document.getElementById("currency"),
    compressed: document.getElementById("compressed"),
    autoReturn: document.getElementById("autoReturn"),
    reader: document.getElementById("reader"),
    startButton: document.getElementById("startButton"),
    stopButton: document.getElementById("stopButton"),
    clearButton: document.getElementById("clearButton"),
    status: document.getElementById("status"),
    chunks: document.getElementById("chunks"),
    manualInput: document.getElementById("manualInput"),
    addManualButton: document.getElementById("addManualButton"),
    returnButton: document.getElementById("returnButton"),
    lastScan: document.getElementById("lastScan"),
    hexOutput: document.getElementById("hexOutput"),
    wifOutput: document.getElementById("wifOutput")
  };

  function getQuery(name) {
    return new URLSearchParams(window.location.search).get(name);
  }

  function setStatus(text, isError) {
    elems.status.textContent = text;
    elems.status.className = isError ? "error" : "muted";
  }

  function hexToBytes(hex) {
    var clean = String(hex || "").trim().replace(/^0x/i, "").replace(/\s+/g, "").toLowerCase();
    var bytes;
    var i;

    if (clean.length % 2 !== 0 || !/^[0-9a-f]*$/.test(clean)) {
      throw new Error("Invalid hex.");
    }

    bytes = new Uint8Array(clean.length / 2);

    for (i = 0; i < clean.length; i += 2) {
      bytes[i / 2] = parseInt(clean.slice(i, i + 2), 16);
    }

    return bytes;
  }

  function bytesToHex(bytes) {
    return Array.from(bytes, function mapByte(byte) {
      return byte.toString(16).padStart(2, "0");
    }).join("");
  }

  function concatBytes() {
    var arrays = Array.from(arguments);
    var total = arrays.reduce(function sum(n, arr) { return n + arr.length; }, 0);
    var out = new Uint8Array(total);
    var offset = 0;

    arrays.forEach(function append(arr) {
      out.set(arr, offset);
      offset += arr.length;
    });

    return out;
  }

  async function sha256(bytes) {
    return new Uint8Array(await crypto.subtle.digest("SHA-256", bytes));
  }

  async function doubleSha256(bytes) {
    return sha256(await sha256(bytes));
  }

  function bytesToBase58(bytes) {
    var digits = [0];
    var output = "";
    var i;

    if (!bytes.length) {
      return "";
    }

    for (const byte of bytes) {
      var carry = byte;

      for (i = digits.length - 1; i >= 0; i -= 1) {
        var current = digits[i] * 256 + carry;
        digits[i] = current % 58;
        carry = Math.floor(current / 58);
      }

      while (carry > 0) {
        digits.unshift(carry % 58);
        carry = Math.floor(carry / 58);
      }
    }

    for (const byte of bytes) {
      if (byte === 0) {
        output += "1";
      } else {
        break;
      }
    }

    return output + digits.map(function mapDigit(digit) { return B58[digit]; }).join("");
  }

  async function base58CheckEncode(payloadBytes) {
    var checksum = (await doubleSha256(payloadBytes)).slice(0, 4);

    return bytesToBase58(concatBytes(payloadBytes, checksum));
  }

  function validatePrivateKeyHex(hex) {
    var clean = String(hex || "").trim().replace(/^0x/i, "").replace(/\s+/g, "").toLowerCase();

    if (!/^[0-9a-f]{64}$/.test(clean)) {
      throw new Error("Private key must be exactly 64 hex characters.");
    }

    if (/^0+$/.test(clean)) {
      throw new Error("Private key cannot be zero.");
    }

    if (clean >= secp256k1Order) {
      throw new Error("Private key is outside the secp256k1 range.");
    }

    return clean;
  }

  async function privateKeyHexToWif(hex, compressed) {
    var keyBytes = hexToBytes(validatePrivateKeyHex(hex));
    var versionBytes = new Uint8Array([Number(config.MAINNET_WIF_PREFIX || 128)]);
    var payload = compressed === false
      ? concatBytes(versionBytes, keyBytes)
      : concatBytes(versionBytes, keyBytes, new Uint8Array([1]));

    return base58CheckEncode(payload);
  }

  function normalizeScanText(text) {
    var raw = String(text || "").trim();
    var parsed;
    var candidates;

    if (!raw) {
      throw new Error("Empty QR scan.");
    }

    try {
      parsed = JSON.parse(raw);
      raw = parsed.hex || parsed.privateKeyHex || parsed.key || parsed.chunk || raw;
    } catch (ignore) {}

    raw = String(raw).replace(/^chisel:/i, "").replace(/^hex:/i, "").replace(/^0x/i, "");
    candidates = raw.match(/[0-9a-fA-F]{16,64}/g) || [];

    if (candidates.length === 0) {
      throw new Error("QR did not contain a 16-hex chunk or 64-hex private key.");
    }

    candidates.sort(function byLength(a, b) { return b.length - a.length; });
    return candidates[0].toLowerCase();
  }

  function getFullHex() {
    return chunks.join("");
  }

  function renderChunks() {
    var i;
    var fullHex = getFullHex();

    elems.chunks.innerHTML = "";

    for (i = 0; i < 4; i += 1) {
      var row = document.createElement("div");
      var label = document.createElement("div");
      var slot = document.createElement("div");

      row.className = "chunkRow";
      label.className = "muted";
      slot.className = "slot";
      label.textContent = "part " + (i + 1);
      slot.textContent = chunks[i] || "";
      row.appendChild(label);
      row.appendChild(slot);
      elems.chunks.appendChild(row);
    }

    elems.hexOutput.textContent = fullHex;
    elems.returnButton.disabled = fullHex.length !== Number(config.REQUIRED_HEX_LENGTH || 64);

    if (fullHex.length !== Number(config.REQUIRED_HEX_LENGTH || 64)) {
      elems.wifOutput.textContent = "";
    }
  }

  async function rebuildWifAndMaybeReturn() {
    var fullHex = getFullHex();
    var compressed = elems.compressed.value !== "0";
    var wif;

    renderChunks();

    if (fullHex.length !== Number(config.REQUIRED_HEX_LENGTH || 64)) {
      setStatus("Collected " + fullHex.length + " / 64 hex characters.", false);
      return;
    }

    wif = await privateKeyHexToWif(fullHex, compressed);
    elems.wifOutput.textContent = wif;
    elems.returnButton.disabled = false;
    setStatus("64 hex characters collected. WIF built.", false);

    if (elems.autoReturn.checked && !didAutoReturn && window.opener) {
      didAutoReturn = true;
      returnToOpener();
    }
  }

  function addHex(value) {
    var clean = normalizeScanText(value);
    var chunkSize = Number(config.CHUNK_HEX_LENGTH || 16);
    var requiredSize = Number(config.REQUIRED_HEX_LENGTH || 64);
    var i;

    if (clean.length === requiredSize) {
      chunks = [];
      for (i = 0; i < requiredSize; i += chunkSize) {
        chunks.push(clean.slice(i, i + chunkSize));
      }
      didAutoReturn = false;
      return rebuildWifAndMaybeReturn();
    }

    if (clean.length !== chunkSize) {
      throw new Error("Expected 16 hex characters per sticker. Got " + clean.length + ".");
    }

    if (chunks.length >= 4) {
      throw new Error("Already have four chunks. Clear before scanning a new key.");
    }

    chunks.push(clean);
    didAutoReturn = false;
    return rebuildWifAndMaybeReturn();
  }

  function onScanSuccess(decodedText) {
    var now = Date.now();

    if (decodedText === lastText && now - lastAt < 1800) {
      return;
    }

    lastText = decodedText;
    lastAt = now;
    elems.lastScan.textContent = decodedText;

    addHex(decodedText).catch(function onError(error) {
      setStatus(error.message || String(error), true);
    });
  }

  function loadScannerLibrary() {
    return new Promise(function executor(resolve, reject) {
      var script;

      if (window.Html5Qrcode) {
        resolve();
        return;
      }

      script = document.createElement("script");
      script.src = config.HTML5_QRCODE_SRC;
      script.onload = resolve;
      script.onerror = function onError() {
        reject(new Error("Could not load html5-qrcode from " + config.HTML5_QRCODE_SRC));
      };
      document.head.appendChild(script);
    });
  }

  async function startCamera() {
    var cameras;
    var cameraId;

    try {
      await loadScannerLibrary();

      if (!window.Html5Qrcode) {
        throw new Error("Html5Qrcode is not available.");
      }

      scanner = scanner || new Html5Qrcode("reader");
      cameras = await Html5Qrcode.getCameras();

      if (!cameras || cameras.length === 0) {
        throw new Error("No camera found.");
      }

      cameraId = cameras[0].id;
      await scanner.start(
        cameraId,
        {
          fps: Number(config.FPS || 10),
          qrbox: {
            width: Number(config.QRBOX_SIZE || 260),
            height: Number(config.QRBOX_SIZE || 260)
          }
        },
        onScanSuccess
      );

      isRunning = true;
      elems.startButton.disabled = true;
      elems.stopButton.disabled = false;
      setStatus("Camera running. Scan part 1 of 4.", false);
    } catch (error) {
      setStatus(error.message || String(error), true);
    }
  }

  async function stopCamera() {
    if (!scanner || !isRunning) {
      return;
    }

    await scanner.stop();
    isRunning = false;
    elems.startButton.disabled = false;
    elems.stopButton.disabled = true;
    setStatus("Camera stopped.", false);
  }

  function clearAll() {
    chunks = [];
    lastText = "";
    lastAt = 0;
    didAutoReturn = false;
    elems.lastScan.textContent = "";
    elems.manualInput.value = "";
    elems.wifOutput.textContent = "";
    renderChunks();
    setStatus("Cleared.", false);
  }

  function returnToOpener() {
    var fullHex = validatePrivateKeyHex(getFullHex());
    var wif = elems.wifOutput.textContent.trim();
    var currency = elems.currency.value;
    var compressed = elems.compressed.value !== "0";

    if (!wif) {
      setStatus("WIF is not built yet.", true);
      return;
    }

    if (window.opener) {
      window.opener.postMessage({
        type: "chisel:qr-wif",
        currency: currency,
        compressed: compressed,
        privateKeyHex: fullHex,
        wif: wif
      }, "*");
      setStatus("WIF sent to Chisel.", false);
      return;
    }

    setStatus("No opener window found. Copy WIF manually.", true);
  }

  function initFromQuery() {
    var currency = getQuery("currency");
    var compressed = getQuery("compressed");

    if (currency && elems.currency.querySelector('option[value="' + currency + '"]')) {
      elems.currency.value = currency;
    }

    if (compressed === "0") {
      elems.compressed.value = "0";
    } else if (compressed === "1") {
      elems.compressed.value = "1";
    } else {
      elems.compressed.value = config.DEFAULT_COMPRESSED === false ? "0" : "1";
    }
  }

  elems.startButton.onclick = startCamera;
  elems.stopButton.onclick = function onStopClick() {
    stopCamera().catch(function onError(error) { setStatus(error.message || String(error), true); });
  };
  elems.clearButton.onclick = clearAll;
  elems.addManualButton.onclick = function onAddManual() {
    addHex(elems.manualInput.value).then(function onDone() {
      elems.manualInput.value = "";
    }).catch(function onError(error) {
      setStatus(error.message || String(error), true);
    });
  };
  elems.returnButton.onclick = returnToOpener;
  elems.compressed.onchange = rebuildWifAndMaybeReturn;

  initFromQuery();
  renderChunks();
})();
</script>
</body>
</html>
