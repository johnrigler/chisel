<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>QR Label Sheet</title>

<style>
  body {
    margin: 0;
    background: #fff;
    font-family: Arial, sans-serif;
  }

  .toolbar {
    position: fixed;
    top: 10px;
    right: 10px;
    display: flex;
    gap: 10px;
    z-index: 10;
  }

  button {
    padding: 10px 14px;
    border: 0;
    border-radius: 8px;
    background: #111;
    color: #fff;
    cursor: pointer;
  }

  #sheet {
    display: grid;
    padding: 24px;
  }

  .tile {
    display: grid;
    place-items: center;
    background: #fff;
  }

  .qr-frame {
    display: grid;
    place-items: center;
    background: #fff;
  }

  @media print {
    .toolbar {
      display: none !important;
    }

    #sheet {
      padding: 0;
    }
  }
</style>
</head>

<body>

<div class="toolbar">
  <button id="printButton" type="button">PRINT</button>
  <button id="randomButton" type="button">RANDOMIZE</button>
</div>

<main id="sheet"></main>

<script>
(function () {
  //
  // Constants
  //
  const DEFAULT_ROWS = 5;
  const DEFAULT_COLS = 7;
  const TILE_SIZE = 110;
  const BORDER_THICKNESS = 6;
  const INSET = 10;
  const GAP = 8;

  const LOCAL_QR_PATH = "./lib/qrcode.min.js";
  const REMOTE_QR_API = "https://api.qrserver.com/v1/create-qr-code/";

  //
  // State
  //
  const state = {
    rows: DEFAULT_ROWS,
    cols: DEFAULT_COLS,
    values: [],
    hasLocalQR: false,
    isPrinting: false,
    hasPendingPostPrintRandomize: false,
  };

  //
  // Elements
  //
  const elems = {
    sheet: document.querySelector("#sheet"),
    printButton: document.querySelector("#printButton"),
    randomButton: document.querySelector("#randomButton"),
  };

  //
  // QR loading
  //
  function loadScript(src) {
    return new Promise(function (resolve, reject) {
      const script = document.createElement("script");

      script.src = src;
      script.onload = resolve;
      script.onerror = reject;

      document.head.appendChild(script);
    });
  }

  async function setQrLibraryAvailability() {
    if (window.QRCode) {
      state.hasLocalQR = true;
      return;
    }

    try {
      await loadScript(LOCAL_QR_PATH);
      state.hasLocalQR = typeof window.QRCode !== "undefined";
    } catch (error) {
      state.hasLocalQR = false;
    }
  }

  //
  // Generators
  //
  function generateRandomHexChunk() {
    return Math.random().toString(16).slice(2);
  }

  function generateRandomHexValue() {
    return (generateRandomHexChunk() + generateRandomHexChunk()).slice(0, 16).toUpperCase();
  }

  function generateValues() {
    const total = state.rows * state.cols;
    state.values = [];

    for (let index = 0; index < total; index += 1) {
      state.values.push(generateRandomHexValue());
    }
  }

  //
  // Formatters
  //
  function clampChannel(value) {
    return Math.max(0, Math.min(255, value));
  }

  function getBorderColor(value) {
    const red = Number.parseInt(value.slice(0, 2), 16);
    const green = Number.parseInt(value.slice(2, 4), 16);
    const blue = Number.parseInt(value.slice(4, 6), 16);

    return "rgb(" +
      clampChannel(red) + ", " +
      clampChannel(green) + ", " +
      clampChannel(blue) + ")";
  }

  function getQrSize() {
    return TILE_SIZE - INSET * 2 - BORDER_THICKNESS * 2;
  }

  function getRemoteQrUrl(value) {
    const size = getQrSize();
    const params = new URLSearchParams({
      size: size + "x" + size,
      data: value,
      ecc: "H",
      margin: "0",
    });

    return REMOTE_QR_API + "?" + params.toString();
  }

  //
  // QR rendering
  //
  function renderLocalQr(mount, value) {
    mount.innerHTML = "";

    new QRCode(mount, {
      text: value,
      width: getQrSize(),
      height: getQrSize(),
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H,
    });

    const image = mount.querySelector("img");
    const canvas = mount.querySelector("canvas");

    if (image) {
      image.width = getQrSize();
      image.height = getQrSize();
      image.alt = "QR code for " + value;
      image.style.display = "block";
    }

    if (canvas) {
      canvas.width = getQrSize();
      canvas.height = getQrSize();
      canvas.style.display = "block";
    }
  }

  function renderRemoteQr(mount, value) {
    const image = document.createElement("img");

    image.src = getRemoteQrUrl(value);
    image.width = getQrSize();
    image.height = getQrSize();
    image.alt = "QR code for " + value;
    image.style.display = "block";

    mount.innerHTML = "";
    mount.appendChild(image);
  }

  function renderQr(mount, value) {
    if (state.hasLocalQR) {
      renderLocalQr(mount, value);
      return;
    }

    renderRemoteQr(mount, value);
  }

  //
  // DOM builders
  //
  function createTile(value) {
    const tile = document.createElement("div");
    const frame = document.createElement("div");
    const mount = document.createElement("div");

    tile.className = "tile";
    tile.style.width = TILE_SIZE + "px";
    tile.style.height = TILE_SIZE + "px";
    tile.style.padding = INSET + "px";

    frame.className = "qr-frame";
    frame.style.width = TILE_SIZE - INSET * 2 + "px";
    frame.style.height = TILE_SIZE - INSET * 2 + "px";
    frame.style.padding = BORDER_THICKNESS + "px";
    frame.style.border = BORDER_THICKNESS + "px solid " + getBorderColor(value);

    frame.appendChild(mount);
    tile.appendChild(frame);

    renderQr(mount, value);

    return tile;
  }

  //
  // DOM setters
  //
  function renderSheet() {
    elems.sheet.innerHTML = "";
    elems.sheet.style.gridTemplateColumns = "repeat(" + state.cols + ", " + TILE_SIZE + "px)";
    elems.sheet.style.gap = GAP + "px";

    state.values.forEach(function renderTile(value) {
      elems.sheet.appendChild(createTile(value));
    });
  }

  function render() {
    renderSheet();
  }

  function randomizeAndRender() {
    generateValues();
    render();
  }

  //
  // Print lifecycle
  //
  function setPrintStarted() {
    state.isPrinting = true;
    state.hasPendingPostPrintRandomize = true;
  }

  function setPrintFinished() {
    if (!state.hasPendingPostPrintRandomize) {
      state.isPrinting = false;
      return;
    }

    state.isPrinting = false;
    state.hasPendingPostPrintRandomize = false;
    randomizeAndRender();
  }

  //
  // DOM listeners
  //
  function onClickPrint() {
    setPrintStarted();
    window.print();
  }

  function onClickRandomize() {
    randomizeAndRender();
  }

  function onBeforePrint() {
    setPrintStarted();
  }

  function onAfterPrint() {
    setPrintFinished();
  }

  function onPrintMediaChange(event) {
    if (event.matches) {
      setPrintStarted();
      return;
    }

    setPrintFinished();
  }

  function addPrintListeners() {
    window.addEventListener("beforeprint", onBeforePrint);
    window.addEventListener("afterprint", onAfterPrint);

    if (typeof window.matchMedia === "function") {
      const mediaQueryList = window.matchMedia("print");

      if (typeof mediaQueryList.addEventListener === "function") {
        mediaQueryList.addEventListener("change", onPrintMediaChange);
      } else if (typeof mediaQueryList.addListener === "function") {
        mediaQueryList.addListener(onPrintMediaChange);
      }
    }
  }

  function addEventListeners() {
    elems.printButton.onclick = onClickPrint;
    elems.randomButton.onclick = onClickRandomize;
    addPrintListeners();
  }

  //
  // Init
  //
  async function init() {
    await setQrLibraryAvailability();
    addEventListeners();
    randomizeAndRender();
  }

  init();
})();
</script>

</body>
</html>
