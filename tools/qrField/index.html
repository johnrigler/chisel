<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <title>QR Label Sheet Example</title>

  <style>
    :root {
      --PAGE_WIDTH: 8.5in;
      --PAGE_HEIGHT: 11in;

      --SHEET_MARGIN_TOP: 0.5in;
      --SHEET_MARGIN_LEFT: 0.25in;

      --LABEL_WIDTH: 2in;
      --LABEL_HEIGHT: 2in;

      --COLUMN_GAP: 0in;
      --ROW_GAP: 0in;

      --COLUMN_PITCH: calc(var(--LABEL_WIDTH) + var(--COLUMN_GAP));
      --ROW_PITCH: calc(var(--LABEL_HEIGHT) + var(--ROW_GAP));

      --COLUMNS: 4;
      --ROWS: 5;

      --QR_SIZE: 1.3in;
      --LABEL_PADDING: 0.12in;
      --FRAME_PADDING: 0.22in;

      --FONT_SIZE: 10pt;
      --SHOW_GUIDES: 1;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: #f3f3f3;
      color: #111;
      font-family: Arial, Helvetica, sans-serif;
    }

    .toolbar {
      max-width: 10in;
      margin: 0 auto;
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .toolbar h1,
    .toolbar p {
      margin: 0;
    }

    .toolbar button {
      width: fit-content;
      padding: 10px 14px;
      border: 0;
      border-radius: 8px;
      background: #111;
      color: #fff;
      cursor: pointer;
      font: inherit;
    }

    .sheet {
      position: relative;
      width: var(--PAGE_WIDTH);
      height: var(--PAGE_HEIGHT);
      margin: 0 auto 24px;
      background: #fff;
      box-shadow: 0 0 0 1px #ddd, 0 8px 30px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .label {
      position: absolute;
      width: var(--LABEL_WIDTH);
      height: var(--LABEL_HEIGHT);
      border: calc(var(--SHOW_GUIDES) * 1px) dashed rgba(0, 0, 0, 0.25);
    }

    .labelFrame {
      width: 100%;
      height: 100%;
      padding: var(--FRAME_PADDING);
      display: grid;
    }

    .labelBody {
      width: 100%;
      height: 100%;
      padding: var(--LABEL_PADDING);
      background: #fff;
      display: grid;
      grid-template-rows: 1fr auto;
      align-items: center;
      justify-items: center;
      gap: 0.06in;
    }

    .qrSlot {
      width: var(--QR_SIZE);
      height: var(--QR_SIZE);
      display: grid;
      place-items: center;
    }

    .qrSlot img,
    .qrSlot canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
    }

    .labelText {
      max-width: 100%;
      font-size: var(--FONT_SIZE);
      line-height: 1.2;
      text-align: center;
      word-break: break-word;
    }

    .helpCode {
      background: #eee;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: inherit;
    }

    @page {
      size: letter portrait;
      margin: 0;
    }

   @media print {
  html,
  body {
    background: #fff;
  }

  .toolbar {
    display: none;
  }

  .sheet {
    margin: 0;
    box-shadow: none;
  }
  {
   -webkit-print-color-adjust: exact;
   print-color-adjust: exact;
   } 
} 
  </style>
</head>
<body>
  <section class="toolbar">
    <h1>QR Label Sheet Example</h1>
    <p>
      This page is a working example built for your older QR package interface:
      <span class="helpCode">new QRCode(element, options)</span>.
    </p>
    <p>
      Print on plain paper first. Then adjust
      <span class="helpCode">--SHEET_MARGIN_TOP</span>,
      <span class="helpCode">--SHEET_MARGIN_LEFT</span>,
      <span class="helpCode">--LABEL_WIDTH</span>,
      and
      <span class="helpCode">--LABEL_HEIGHT</span>
      until the guides line up with your real label stock.
    </p>
    <button id="printButton" type="button">PRINT</button>
  </section>

  <main class="sheet" id="sheet"></main>

  <script src="lib/davidshimjs-qrcodejs-04f46c6/qrcode.min.js"></script>
  <script>
    (function () {
      //
      // Constants
      //
      const COLUMNS = 4;
      const ROWS = 5;
      const TOTAL_LABELS = COLUMNS * ROWS;
      const QR_PIXEL_SIZE = 180;
      const HEX_LENGTH = 16;

      //
      // Elements
      //
      const elems = {
        printButton: document.querySelector("#printButton"),
        sheet: document.querySelector("#sheet")
      };

      //
      // State
      //
      let cachedLabels = null;

      //
      // Helpers
      //
      function getRandomHex(length) {
        const BYTE_LENGTH = Math.ceil(length / 2);
        const bytes = new Uint8Array(BYTE_LENGTH);

        crypto.getRandomValues(bytes);

        return Array.from(bytes, function mapByte(byte) {
          return byte.toString(16).padStart(2, "0");
        }).join("").slice(0, length).toUpperCase();
      }

      function getBorderColorFromValue(value) {
        return "#" + value.slice(0, 6);
      }

      //
      // Data
      //
      function getLabelData() {
        if (cachedLabels) {
          return cachedLabels;
        }

        cachedLabels = Array.from({ length: TOTAL_LABELS }, function mapLabel() {
          const VALUE = getRandomHex(HEX_LENGTH);

          return {
            qrValue: VALUE,
            text: VALUE,
            borderColor: getBorderColorFromValue(VALUE)
          };
        });

        return cachedLabels;
      }

      //
      // DOM setters
      //
      function setLabelPosition(label, columnIndex, rowIndex) {
        label.style.left = "calc(var(--SHEET_MARGIN_LEFT) + (" + columnIndex + " * var(--COLUMN_PITCH)))";
        label.style.top = "calc(var(--SHEET_MARGIN_TOP) + (" + rowIndex + " * var(--ROW_PITCH)))";
      }

      function setLabelBorderColor(frame, borderColor) {
        frame.style.background = borderColor;
      }

      function createLabel() {
        const article = document.createElement("article");
        const frame = document.createElement("div");
        const body = document.createElement("div");

        article.className = "label";
        frame.className = "labelFrame";
        body.className = "labelBody";

        frame.append(body);
        article.append(frame);

        return {
          label: article,
          frame: frame,
          body: body
        };
      }

      function createQrSlot() {
        const div = document.createElement("div");
        div.className = "qrSlot";

        return div;
      }

      function createLabelText(text) {
        const div = document.createElement("div");
        div.className = "labelText";
        div.textContent = text;

        return div;
      }

      function appendLabel(label) {
        elems.sheet.append(label);
      }

      function renderQrCode(qrSlot, value) {
        qrSlot.innerHTML = "";

        new QRCode(qrSlot, {
          text: value,
          width: QR_PIXEL_SIZE,
          height: QR_PIXEL_SIZE,
          colorDark: "#000000",
          colorLight: "#ffffff",
          correctLevel: QRCode.CorrectLevel.H
        });
      }

      function renderLabels() {
        const labels = getLabelData();

        labels.forEach(function renderLabel(labelData, index) {
          const rowIndex = Math.floor(index / COLUMNS);
          const columnIndex = index % COLUMNS;
          const labelParts = createLabel();
          const qrSlot = createQrSlot();
          // const text = createLabelText(labelData.text);

          setLabelPosition(labelParts.label, columnIndex, rowIndex);
          setLabelBorderColor(labelParts.frame, labelData.borderColor);

          labelParts.body.append(qrSlot, "");
	// the code above printed the value out below the hex.
	// when I take it out completely, the qr code does not display.
          appendLabel(labelParts.label);
          renderQrCode(qrSlot, labelData.qrValue);
        });
      }

      //
      // DOM listeners
      //
      function onPrintButtonClick() {
        window.print();
      }

      function addEventListeners() {
        elems.printButton.onclick = onPrintButtonClick;
      }

      //
      // Init
      //
      addEventListeners();
      renderLabels();
    })();
  </script>
</body>
</html>
